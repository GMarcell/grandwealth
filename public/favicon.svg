<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2140"/>
      <stop offset="1" stop-color="#0E1026"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="512" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C99A3E"/>
      <stop offset="1" stop-color="#F3D27A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ascending bars: wealth growth -->
  <rect x="128" y="292" width="60" height="120" rx="14" fill="url(#gold)"/>
  <rect x="226" y="230" width="60" height="182" rx="14" fill="url(#gold)"/>
  <rect x="324" y="150" width="60" height="262" rx="14" fill="url(#gold)"/>

  <!-- coin accent sitting on the tallest bar: gold holdings -->
  <circle cx="354" cy="122" r="40" fill="#0E1026" stroke="url(#gold)" stroke-width="10"/>
  <path d="M354 104 V140 M340 112 H368 M340 132 H368" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
</svg>
